<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo Mensajes — Taller Backend</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>Demo de Mensajes</h1>
    <p>Frontend conectado al backend NestJS · <span id="api-url-label"></span></p>
  </header>

  <main>

    <!-- ===== FORMULARIO ===== -->
    <section class="card" id="form-card">
      <h2>Nuevo mensaje</h2>

      <div class="form-group">
        <label for="input-name">Nombre</label>
        <input
          type="text"
          id="input-name"
          placeholder="Tu nombre"
          autocomplete="off"
        />
      </div>

      <div class="form-group">
        <label for="input-message">Mensaje</label>
        <textarea
          id="input-message"
          placeholder="Escribe tu mensaje aquí..."
          rows="4"
        ></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="input-type">Tipo</label>
          <select id="input-type">
            <option value="saludo">Saludo</option>
            <option value="pregunta">Pregunta</option>
            <option value="comentario">Comentario</option>
          </select>
        </div>

        <div class="form-group form-group--checkbox">
          <label class="checkbox-label">
            <input type="checkbox" id="input-important" />
            <span class="checkbox-text">Importante</span>
          </label>
        </div>
      </div>

      <button id="btn-send" onclick="sendMessage()">
        <span id="btn-send-text">Guardar mensaje</span>
        <span id="btn-send-loading" class="hidden">Enviando...</span>
      </button>

      <!-- Feedback del envío -->
      <div id="send-feedback" class="feedback hidden"></div>
    </section>

    <!-- ===== LISTA ===== -->
    <section class="card" id="list-card">
      <div class="list-header">
        <h2>Mensajes <span id="msg-count" class="count"></span></h2>
        <button class="btn-secondary" onclick="loadMessages()">
          Refrescar
        </button>
      </div>

      <!-- Estado: cargando -->
      <div id="list-loading" class="state-msg hidden">
        Cargando...
      </div>

      <!-- Estado: error de red -->
      <div id="list-error" class="state-msg state-error hidden">
        No se pudo conectar con el backend.
      </div>

      <!-- Estado: sin mensajes -->
      <div id="list-empty" class="state-msg hidden">
        Aún no hay mensajes. ¡Envía el primero!
      </div>

      <!-- Lista real -->
      <ul id="messages-list"></ul>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
